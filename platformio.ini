[platformio]
default_envs = native

; ── Native: runs unit tests for Frame + Schema on Linux CI ──────────────────
[env:native]
platform = native
test_framework = unity
build_flags =
    -std=c++17
lib_deps =
    bblanchon/ArduinoJson@^7.0.0
test_ignore = test_protocol
; Library projects don't compile src/ for tests by default
test_build_src = yes

; ── ESP32-C3: builds library + protocol tests, verifies compilation ──────────
[env:esp32-c3]
platform = espressif32
board = esp32-c3-devkitm-1
framework = arduino
; Remove the platform default (gnu++11) so our flag takes precedence
build_unflags = -std=gnu++11
build_flags =
    -std=gnu++17
    -DMSC_OTEL_ENABLED
    -DWIFI_SSID='"${sysenv.WIFI_SSID}"'
    -DWIFI_PASS='"${sysenv.WIFI_PASS}"'
    -DOTEL_COLLECTOR_HOST='"${sysenv.OTEL_COLLECTOR_HOST}"'
    -DOTEL_COLLECTOR_PORT=${sysenv.OTEL_COLLECTOR_PORT}
    -DOTEL_SERVICE_NAME='"${sysenv.OTEL_SERVICE_NAME}"'
    -DOTEL_SERVICE_NAMESPACE='"${sysenv.OTEL_SERVICE_NAMESPACE}"'
    -DOTEL_SERVICE_VERSION='"${sysenv.OTEL_SERVICE_VERSION}"'
    -DOTEL_SERVICE_INSTANCE='"${sysenv.OTEL_SERVICE_INSTANCE}"'
    -DOTEL_DEPLOY_ENV='"${sysenv.OTEL_DEPLOY_ENV}"'
lib_deps =
    bblanchon/ArduinoJson@^7.0.0
    https://github.com/proffalken/otel-embedded-cpp.git#main
